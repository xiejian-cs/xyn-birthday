<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎂 小柠檬 · 苡柠3岁生日快乐</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #fffde7 0%, #fff9c4 30%, #f3e5f5 60%, #e8f5e9 100%);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* ===== 彩带 ===== */
    .confetti-container {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .confetti {
      position: absolute;
      top: -40px;
      animation: confettiFall linear infinite;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
      80%  { opacity: 0.8; }
      100% { transform: translateY(105vh) rotate(1080deg) scale(0.4); opacity: 0; }
    }

    /* ===== 气球 ===== */
    .balloons {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .balloon {
      position: absolute;
      bottom: -180px;
      animation: rise linear infinite;
    }
    .balloon .b-body {
      width: 50px; height: 64px;
      border-radius: 50%;
      position: relative;
      margin: 0 auto;
    }
    .balloon .b-body::after {
      content: '';
      position: absolute;
      bottom: -8px; left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 10px solid inherit;
    }
    .balloon .string {
      width: 1.5px; height: 50px;
      background: rgba(0,0,0,0.2);
      margin: 0 auto;
    }
    @keyframes rise {
      0%   { transform: translateY(0) translateX(0) rotate(-2deg); }
      25%  { transform: translateY(-25vh) translateX(20px) rotate(3deg); }
      50%  { transform: translateY(-50vh) translateX(-15px) rotate(-3deg); }
      75%  { transform: translateY(-75vh) translateX(10px) rotate(2deg); }
      100% { transform: translateY(-110vh) translateX(-10px) rotate(-1deg); }
    }

    /* ===== 主内容 ===== */
    .main {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; padding: 40px 20px;
    }

    /* ===== 标题区 ===== */
    .hero {
      text-align: center;
      animation: fadeIn 1.2s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero .cake-icon {
      font-size: 80px;
      display: block;
      animation: wiggle 1.5s ease-in-out infinite;
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg) scale(1); }
      25%      { transform: rotate(3deg) scale(1.05); }
      75%      { transform: rotate(-3deg) scale(1.05); }
    }

    .hero h1 {
      font-size: 48px;
      font-weight: 700;
      background: linear-gradient(135deg, #f9a825, #7cb342, #43a047);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 12px 0 8px;
      letter-spacing: 6px;
    }
    .hero .subtitle {
      font-size: 18px;
      color: #888;
      letter-spacing: 2px;
    }

    /* ===== 年龄牌子 ===== */
    .age-badge {
      display: inline-block;
      background: #fff;
      border-radius: 60px;
      padding: 6px 24px;
      font-size: 20px;
      font-weight: 700;
      color: #7cb342;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      margin-top: 16px;
    }
    .age-badge span {
      font-size: 36px;
      color: #f9a825;
      margin: 0 4px;
    }

    /* ===== 祝福卡片 ===== */
    .card {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 36px 32px;
      max-width: 500px;
      width: 100%;
      margin-top: 32px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.06);
      animation: fadeIn 1.2s ease-out 0.3s both;
    }
    .card h2 {
      font-size: 22px;
      color: #7cb342;
      margin-bottom: 16px;
      text-align: center;
    }
    .card .wish-text {
      font-size: 16px;
      color: #555;
      line-height: 2.2;
      text-align: center;
    }
    .card .wish-text .hl {
      color: #f9a825;
      font-weight: 600;
    }

    /* ===== 星星分割线 ===== */
    .divider {
      text-align: center;
      margin: 20px 0;
      font-size: 18px;
      letter-spacing: 8px;
      color: #aed581;
    }

    /* ===== 互动按钮 ===== */
    .actions {
      margin-top: 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    .btn {
      padding: 12px 28px;
      border-radius: 50px;
      border: none;
      font-size: 15px;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover  { transform: translateY(-3px); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: linear-gradient(135deg, #f9a825, #7cb342);
      color: #fff;
      box-shadow: 0 6px 20px rgba(124,179,66,0.35);
    }
    .btn-outline {
      background: #fff;
      color: #7cb342;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    }

    /* ===== 吹蜡烛画布 ===== */
    .candle-section {
      margin-top: 28px;
      text-align: center;
    }
    .candle-hint {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 10px;
    }
    .candles {
      display: flex;
      gap: 16px;
      justify-content: center;
      align-items: flex-end;
    }
    .candle {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .candle:hover { transform: scale(1.1); }
    .candle .flame {
      font-size: 28px;
      transition: opacity 0.3s;
    }
    .candle .flame.out { opacity: 0; }
    .candle .stick {
      width: 12px; height: 40px;
      background: linear-gradient(180deg, #fff9c4, #ffcc02);
      border-radius: 4px 4px 0 0;
    }
    .candle .base {
      width: 24px; height: 10px;
      background: #ffb74d;
      border-radius: 4px;
    }

    .candles-all-out {
      font-size: 22px;
      color: #7cb342;
      font-weight: 600;
      animation: fadeIn 0.6s ease-out;
      display: none;
    }

    /* ===== 响应式 ===== */
    @media (max-width: 480px) {
      .hero h1 { font-size: 34px; letter-spacing: 4px; }
      .hero .cake-icon { font-size: 60px; }
      .card { padding: 24px 18px; }
    }
  </style>
</head>
<body>

  <!-- 彩带 -->
  <div class="confetti-container" id="confettiContainer"></div>

  <!-- 气球 -->
  <div class="balloons" id="balloonsContainer"></div>

  <!-- 主内容 -->
  <div class="main">
    <div class="hero">
      <span class="cake-icon">🍋</span>
      <h1>小 柠 檬</h1>
      <div class="subtitle">谢苡柠 · 3岁生日快乐</div>
      <div class="age-badge">🎀 <span id="ageNum">3</span> 岁啦 🎀</div>
    </div>

    <div class="card">
      <h2>🍋 给我们的小柠檬 🍋</h2>
      <div class="wish-text">
        <p>亲爱的<span class="hl">小柠檬</span>，</p>
        <p>今天你 <span class="hl">3岁</span> 啦！🎂</p>
        <p>你是家里最甜的小柠檬，</p>
        <p>笑起来比<span class="hl">糖果</span>还要甜 🍬</p>
        <p>比<span class="hl">彩虹</span>还要好看 🌈</p>
        <p>要健康快乐地长大，</p>
        <p>爸爸妈妈永远爱你 ❤️</p>
      </div>

      <div class="divider">⭐ 🌟 ⭐</div>

      <!-- 吹蜡烛 -->
      <div class="candle-section">
        <div class="candle-hint">👇 点点蜡烛吹灭它吧～</div>
        <div class="candles" id="candlesRow">
          <!-- JS 动态生成 -->
        </div>
        <div class="candles-all-out" id="allOutMsg">🎉 小柠檬的愿望一定会实现哦～ 🎉</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" onclick="moreConfetti()">🎊 撒花庆祝</button>
      <button class="btn btn-outline" id="musicBtn" onclick="toggleMusic()">🎵 生日歌</button>
    </div>
  </div>

  <script>
    // ===== 年龄配置 =====
    const birthYear = 2023;   // 苡柠的出生年份
    const birthMonth = 5;     // 出生月份
    const birthDay = 8;       // 出生日期
    const now = new Date();
    let age = now.getFullYear() - birthYear;
    if (now.getMonth() + 1 < birthMonth || (now.getMonth() + 1 === birthMonth && now.getDate() < birthDay)) {
      age--;
    }
    document.getElementById('ageNum').textContent = age;

    // ===== 彩带 =====
    const confettiColors = ['#e91e63','#ff6f00','#ffb300','#4caf50','#2196f3','#9c27b0','#00bcd4','#ff4081','#ffeb3b','#8bc34a'];
    const confettiShapes = ['●','■','▲','★','♦','♥','◆'];
    const container = document.getElementById('confettiContainer');

    function spawnConfetti() {
      const el = document.createElement('span');
      el.className = 'confetti';
      el.textContent = confettiShapes[Math.floor(Math.random() * confettiShapes.length)];
      el.style.left = Math.random() * 100 + '%';
      el.style.fontSize = (10 + Math.random() * 18) + 'px';
      el.style.color = confettiColors[Math.floor(Math.random() * confettiColors.length)];
      el.style.animationDuration = (6 + Math.random() * 8) + 's';
      el.style.animationDelay = Math.random() * 4 + 's';
      container.appendChild(el);
      el.addEventListener('animationend', () => { el.remove(); spawnConfetti(); });
    }
    for (let i = 0; i < 25; i++) setTimeout(spawnConfetti, i * 300);

    // ===== 气球 =====
    const balloonColors = ['#f06292','#ba68c8','#64b5f6','#4fc3f7','#ffb74d','#81c784','#ff8a65','#fff176'];
    const balloonsBox = document.getElementById('balloonsContainer');

    function spawnBalloon() {
      const b = document.createElement('div');
      b.className = 'balloon';
      b.style.left = (5 + Math.random() * 90) + '%';
      const dur = 12 + Math.random() * 14;
      b.style.animationDuration = dur + 's';
      b.style.animationDelay = Math.random() * 6 + 's';
      const color = balloonColors[Math.floor(Math.random() * balloonColors.length)];
      b.innerHTML = `
        <div class="b-body" style="background:${color}; border:2px solid ${color}dd;"></div>
        <div class="string"></div>
      `;
      balloonsBox.appendChild(b);
      b.addEventListener('animationend', () => { b.remove(); spawnBalloon(); });
    }
    for (let i = 0; i < 8; i++) setTimeout(spawnBalloon, i * 700);

    // ===== 吹蜡烛 =====
    const candlesRow = document.getElementById('candlesRow');
    const totalCandles = Math.min(age, 10); // 最多10根
    let blownCount = 0;

    for (let i = 0; i < totalCandles; i++) {
      const candle = document.createElement('div');
      candle.className = 'candle';
      candle.innerHTML = `
        <span class="flame" data-idx="${i}">🔥</span>
        <div class="stick"></div>
        <div class="base"></div>
      `;
      candle.addEventListener('click', function() {
        const flame = this.querySelector('.flame');
        if (flame.classList.contains('out')) return;
        flame.classList.add('out');
        flame.textContent = '💨';
        blownCount++;
        if (blownCount >= totalCandles) {
          document.getElementById('allOutMsg').style.display = 'block';
          burstCelebrate();
        }
      });
      candlesRow.appendChild(candle);
    }

    // ===== 撒花庆祝 =====
    function moreConfetti() {
      for (let i = 0; i < 40; i++) {
        setTimeout(() => {
          const el = document.createElement('span');
          el.className = 'confetti';
          el.textContent = confettiShapes[Math.floor(Math.random() * confettiShapes.length)];
          el.style.left = Math.random() * 100 + '%';
          el.style.fontSize = (14 + Math.random() * 24) + 'px';
          el.style.color = confettiColors[Math.floor(Math.random() * confettiColors.length)];
          el.style.animationDuration = (4 + Math.random() * 6) + 's';
          el.style.animationDelay = '0s';
          container.appendChild(el);
          el.addEventListener('animationend', () => el.remove());
        }, i * 40);
      }
      burstCelebrate();
    }

    // ===== 爆发爱心 =====
    function burstCelebrate() {
      // 创建临时烟花爱心
      for (let i = 0; i < 20; i++) {
        setTimeout(() => {
          const h = document.createElement('span');
          h.textContent = ['🎉','🎊','✨','💖','🌟','🎀','🍰','🧁','🍋','🍬'][Math.floor(Math.random()*10)];
          h.style.cssText = `
            position:fixed; z-index:999; pointer-events:none;
            font-size:${24+Math.random()*36}px;
            left:${30+Math.random()*40}%;
            top:${50+Math.random()*30}%;
            animation: popUp 2s ease-out forwards;
          `;
          document.body.appendChild(h);
          h.addEventListener('animationend', () => h.remove());
        }, i * 50);
      }
    }

    // ===== 生日歌播放 =====
    const birthdayAudio = new Audio('birthday.mp3');
    birthdayAudio.preload = 'auto';

    function toggleMusic() {
      const btn = document.getElementById('musicBtn');

      if (!birthdayAudio.paused) {
        birthdayAudio.pause();
        btn.textContent = '🎵 生日歌';
        btn.classList.remove('btn-primary');
        btn.classList.add('btn-outline');
        return;
      }

      birthdayAudio.currentTime = 0;
      birthdayAudio.play().catch(() => {
        alert('点击确定后开始播放～');
        birthdayAudio.play();
      });
      btn.textContent = '⏸ 暂停';
      btn.classList.remove('btn-outline');
      btn.classList.add('btn-primary');

      birthdayAudio.onended = () => {
        btn.textContent = '🎵 生日歌';
        btn.classList.remove('btn-primary');
        btn.classList.add('btn-outline');
      };
    }

    // ===== 添加入口动画 =====
    const popUpStyle = document.createElement('style');
    popUpStyle.textContent = `
      @keyframes popUp {
        0%   { opacity:1; transform:translateY(0) scale(0.3); }
        40%  { opacity:1; transform:translateY(-80px) scale(1.3); }
        100% { opacity:0; transform:translateY(-280px) scale(0.2); }
      }
    `;
    document.head.appendChild(popUpStyle);
  </script>
</body>
</html>
